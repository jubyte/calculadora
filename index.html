<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <title>Calculadora Simples</title>
</head>
<body>
    <div class="calculadora">

        <div class="resultado">0</div>
        <div class="botao">
            <button class="escuro">C</button>
            <button class="escuro">±</button>
            <button class="escuro">%</button>
            <button class="colorido">÷</button>
            
            <button class="claro">7</button>
            <button class="claro">8</button>
            <button class="claro">9</button>
            <button class="colorido">×</button>
            
            <button class="claro">4</button>
            <button class="claro">5</button>
            <button class="claro">6</button>
            <button class="colorido">-</button>
            
            <button class="claro">1</button>
            <button class="claro">2</button>
            <button class="claro">3</button>
            <button class="colorido">+</button>
            
            <button class="zero">0</button>
            <button class="claro">,</button>
            <button class="colorido">=</button>
        </div>

    </div>
</body>
</html>
